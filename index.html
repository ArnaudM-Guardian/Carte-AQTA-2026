<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carte AQTA </title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
    }
    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
      background: #ffffff;
    }
    .map-frame {
      width: min(100%, 900px);
      aspect-ratio: 1 / 1;
      background: #ffffff;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="map-frame">
      <iframe
        src="aqta_secteurs_appsheet.svg"
        title="Carte AQTA">
      </iframe>
    </div>
  </div>
</body>
</html>
